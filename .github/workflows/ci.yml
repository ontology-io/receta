name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Build workspace packages
        working-directory: packages/eslint-plugin-receta
        run: |
          bun install --no-save
          bun run build

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Build workspace packages
        working-directory: packages/eslint-plugin-receta
        run: |
          bun install --no-save
          bun run build

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bunx eslint . --max-warnings 0

      - name: Type check
        run: bun run typecheck
