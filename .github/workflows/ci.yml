name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Build eslint-plugin-receta (pre-install)
        working-directory: packages/eslint-plugin-receta
        run: bun install && bun run build

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bunx nx run-many --target=build --all

      - name: Type check
        run: bunx nx run-many --target=typecheck --all

      - name: Run tests
        run: bunx nx run-many --target=test --all

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Build eslint-plugin-receta (pre-install)
        working-directory: packages/eslint-plugin-receta
        run: bun install && bun run build

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bunx nx run-many --target=build --all

      - name: Lint
        run: bunx nx run receta:lint
