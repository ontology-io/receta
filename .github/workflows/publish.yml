# Legacy publish workflow - replaced by release-please.yml
# This workflow can be used for manual publishing if needed

name: Manual Publish to npm

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        type: choice
        options:
          - receta
          - eslint-plugin-receta
          - both

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
          no-cache: true

      - name: Install dependencies
        run: bun install

      - name: Build all packages
        run: bunx nx run-many --target=build --all

      - name: Type check
        run: bunx nx run-many --target=typecheck --all

      - name: Run tests
        run: bunx nx run-many --target=test --all

      - name: Publish receta to npm
        if: ${{ github.event.inputs.package == 'receta' || github.event.inputs.package == 'both' }}
        run: bun publish --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish eslint-plugin-receta to npm
        if: ${{ github.event.inputs.package == 'eslint-plugin-receta' || github.event.inputs.package == 'both' }}
        working-directory: packages/eslint-plugin-receta
        run: bun publish --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
