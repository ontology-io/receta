# Manual publish workflow - for ad-hoc publishing when needed
# Follows the same architecture as release-please.yml but allows manual triggering

name: Manual Publish

on:
  workflow_dispatch:
    inputs:
      registry:
        description: 'Target registry'
        required: true
        type: choice
        options:
          - npm
          - jsr
          - github
          - all
      packages:
        description: 'Packages to publish (comma-separated: receta,receta-testing,eslint-plugin-receta or "all")'
        required: true
        default: 'all'

  workflow_call:
    inputs:
      registry:
        description: 'Target registry'
        type: string
        default: 'all'
      packages:
        description: 'Packages to publish (comma-separated: receta,receta-testing,eslint-plugin-receta or "all")'
        type: string
        required: true
    secrets:
      NPM_TOKEN:
        required: true

jobs:
  # Publish to npm (requires build and tests)
  publish-npm:
    name: Publish to npm
    if: inputs.registry == 'npm' || inputs.registry == 'all'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        package:
          - name: '@ontologyio/receta'
            path: 'packages/receta'
            id: 'receta'
          - name: '@ontologyio/receta-testing'
            path: 'packages/receta-testing'
            id: 'receta-testing'
          - name: '@ontologyio/eslint-plugin-receta'
            path: 'packages/eslint-plugin-receta'
            id: 'eslint-plugin-receta'

    steps:
      - name: Check if package should be published
        id: should_publish
        run: |
          PACKAGES_INPUT="${{ inputs.packages }}"
          PACKAGE_ID="${{ matrix.package.id }}"

          if [[ "$PACKAGES_INPUT" == "all" ]] || [[ ",$PACKAGES_INPUT," == *",$PACKAGE_ID,"* ]]; then
            echo "publish=true" >> $GITHUB_OUTPUT
          else
            echo "publish=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        if: steps.should_publish.outputs.publish == 'true'
        uses: actions/checkout@v4

      - name: Setup build environment
        if: steps.should_publish.outputs.publish == 'true'
        uses: ./.github/actions/setup-build-env
        with:
          registry-url: 'https://registry.npmjs.org'

      - name: Build and test
        if: steps.should_publish.outputs.publish == 'true'
        uses: ./.github/actions/build-and-test

      - name: Publish to npm
        if: steps.should_publish.outputs.publish == 'true'
        uses: ./.github/actions/publish-package
        with:
          package-path: ${{ matrix.package.path }}
          package-name: ${{ matrix.package.name }}
          registry: 'npm'
          access: 'public'
          auth-token: ${{ secrets.NPM_TOKEN }}

      - name: Add to summary
        if: steps.should_publish.outputs.publish == 'true'
        run: |
          echo "✅ Published ${{ matrix.package.name }} to npm" >> $GITHUB_STEP_SUMMARY

  # Publish to JSR (Deno) - no build needed
  publish-jsr:
    name: Publish to JSR
    if: inputs.registry == 'jsr' || inputs.registry == 'all'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        package:
          - name: '@ontologyio/receta'
            path: 'packages/receta'
            id: 'receta'
          - name: '@ontologyio/receta-testing'
            path: 'packages/receta-testing'
            id: 'receta-testing'
          - name: '@receta/eslint-plugin'
            path: 'packages/eslint-plugin-receta'
            id: 'eslint-plugin-receta'

    steps:
      - name: Check if package should be published
        id: should_publish
        run: |
          PACKAGES_INPUT="${{ inputs.packages }}"
          PACKAGE_ID="${{ matrix.package.id }}"

          if [[ "$PACKAGES_INPUT" == "all" ]] || [[ ",$PACKAGES_INPUT," == *",$PACKAGE_ID,"* ]]; then
            echo "publish=true" >> $GITHUB_OUTPUT
          else
            echo "publish=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        if: steps.should_publish.outputs.publish == 'true'
        uses: actions/checkout@v4

      - name: Setup Bun
        if: steps.should_publish.outputs.publish == 'true'
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
          no-cache: true

      - name: Publish to JSR
        if: steps.should_publish.outputs.publish == 'true'
        uses: ./.github/actions/publish-package
        with:
          package-path: ${{ matrix.package.path }}
          package-name: ${{ matrix.package.name }}
          registry: 'jsr'
          auth-token: 'not-needed'

      - name: Add to summary
        if: steps.should_publish.outputs.publish == 'true'
        run: |
          echo "✅ Published ${{ matrix.package.name }} to JSR" >> $GITHUB_STEP_SUMMARY

  # Publish to GitHub Packages (requires build)
  publish-github:
    name: Publish to GitHub Packages
    if: inputs.registry == 'github' || inputs.registry == 'all'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      matrix:
        package:
          - name: '@ontologyio/receta'
            path: 'packages/receta'
            id: 'receta'
          - name: '@ontologyio/receta-testing'
            path: 'packages/receta-testing'
            id: 'receta-testing'
          - name: '@ontologyio/eslint-plugin-receta'
            path: 'packages/eslint-plugin-receta'
            id: 'eslint-plugin-receta'

    steps:
      - name: Check if package should be published
        id: should_publish
        run: |
          PACKAGES_INPUT="${{ inputs.packages }}"
          PACKAGE_ID="${{ matrix.package.id }}"

          if [[ "$PACKAGES_INPUT" == "all" ]] || [[ ",$PACKAGES_INPUT," == *",$PACKAGE_ID,"* ]]; then
            echo "publish=true" >> $GITHUB_OUTPUT
          else
            echo "publish=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        if: steps.should_publish.outputs.publish == 'true'
        uses: actions/checkout@v4

      - name: Setup build environment
        if: steps.should_publish.outputs.publish == 'true'
        uses: ./.github/actions/setup-build-env
        with:
          registry-url: 'https://npm.pkg.github.com'
          scope: '@ontologyio'

      - name: Build packages
        if: steps.should_publish.outputs.publish == 'true'
        run: bunx nx run-many --target=build --all

      - name: Publish to GitHub Packages
        if: steps.should_publish.outputs.publish == 'true'
        uses: ./.github/actions/publish-package
        with:
          package-path: ${{ matrix.package.path }}
          package-name: ${{ matrix.package.name }}
          registry: 'github'
          auth-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add to summary
        if: steps.should_publish.outputs.publish == 'true'
        run: |
          echo "✅ Published ${{ matrix.package.name }} to GitHub Packages" >> $GITHUB_STEP_SUMMARY
