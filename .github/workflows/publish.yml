# Legacy publish workflow - replaced by release-please.yml
# This workflow can be used for manual publishing if needed

name: Manual Publish to GitHub Packages

on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
          no-cache: true

      - name: Install dependencies
        run: bun install

      - name: Build all packages
        run: bunx nx run-many --target=build --all

      - name: Type check
        run: bunx nx run-many --target=typecheck --all

      - name: Run tests
        run: bunx nx run-many --target=test --all
        continue-on-error: true

      - name: Setup GitHub Packages authentication
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > ~/.npmrc
          echo "@${{ github.repository_owner }}:registry=https://npm.pkg.github.com" >> ~/.npmrc

      - name: Publish receta to GitHub Packages
        run: npm publish --access public
