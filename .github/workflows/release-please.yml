name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Create Release PR
    runs-on: ubuntu-latest

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-npm:
    name: Publish to npm
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
          no-cache: true

      - name: Install dependencies
        run: bun install

      - name: Build all packages
        run: bunx nx run-many --target=build --all

      - name: Type check
        run: bunx nx run-many --target=typecheck --all

      - name: Run tests
        run: bunx nx run-many --target=test --all

      - name: Publish receta to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          echo "## Published to npm" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ receta@${{ needs.release-please.outputs.tag_name }}" >> $GITHUB_STEP_SUMMARY

  publish-jsr:
    name: Publish to JSR (Deno)
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
          no-cache: true

      - name: Publish to JSR
        run: npx jsr publish --allow-dirty

      - name: Summary
        run: |
          echo "## Published to JSR" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ @receta/receta@${{ needs.release-please.outputs.tag_name }}" >> $GITHUB_STEP_SUMMARY

  publish-github:
    name: Publish to GitHub Packages
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@ontology-io'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
          no-cache: true

      - name: Install dependencies
        run: bun install

      - name: Build all packages
        run: bunx nx run-many --target=build --all

      - name: Update package name for GitHub Packages
        run: |
          sed -i 's/"name": "receta"/"name": "@ontology-io\/receta"/' package.json

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Published to GitHub Packages" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ @ontology-io/receta@${{ needs.release-please.outputs.tag_name }}" >> $GITHUB_STEP_SUMMARY
