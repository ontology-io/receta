name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write
  packages: write

jobs:
  release-please:
    name: Create Release PR
    runs-on: ubuntu-latest

    outputs:
      # Dynamic outputs for each package
      receta_release_created: ${{ steps.release.outputs['packages/receta--release_created'] }}
      receta_tag_name: ${{ steps.release.outputs['packages/receta--tag_name'] }}
      receta_testing_release_created: ${{ steps.release.outputs['packages/receta-testing--release_created'] }}
      receta_testing_tag_name: ${{ steps.release.outputs['packages/receta-testing--tag_name'] }}
      eslint_plugin_receta_release_created: ${{ steps.release.outputs['packages/eslint-plugin-receta--release_created'] }}
      eslint_plugin_receta_tag_name: ${{ steps.release.outputs['packages/eslint-plugin-receta--tag_name'] }}
      # Flag if any package was released
      any_release_created: ${{ steps.release.outputs['packages/receta--release_created'] == 'true' || steps.release.outputs['packages/receta-testing--release_created'] == 'true' || steps.release.outputs['packages/eslint-plugin-receta--release_created'] == 'true' }}
      # Comma-separated list of released package IDs
      packages_list: ${{ steps.packages_list.outputs.list }}

    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Build released packages list
        id: packages_list
        run: |
          PACKAGES=""
          if [[ "${{ steps.release.outputs['packages/receta--release_created'] }}" == "true" ]]; then
            PACKAGES="${PACKAGES},receta"
          fi
          if [[ "${{ steps.release.outputs['packages/receta-testing--release_created'] }}" == "true" ]]; then
            PACKAGES="${PACKAGES},receta-testing"
          fi
          if [[ "${{ steps.release.outputs['packages/eslint-plugin-receta--release_created'] }}" == "true" ]]; then
            PACKAGES="${PACKAGES},eslint-plugin-receta"
          fi
          echo "list=${PACKAGES#,}" >> $GITHUB_OUTPUT

  # Publish all released packages to all registries
  publish:
    name: Publish packages
    needs: release-please
    if: needs.release-please.outputs.any_release_created == 'true'
    uses: ./.github/workflows/publish.yml
    permissions:
      contents: read
      id-token: write
      packages: write
    with:
      registry: 'all'
      packages: ${{ needs.release-please.outputs.packages_list }}
