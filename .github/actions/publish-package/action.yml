name: Publish Package to Registry
description: Publish a single package to npm, JSR, or GitHub Packages

inputs:
  package-path:
    description: Path to the package directory (e.g., packages/receta)
    required: true

  package-name:
    description: Package name for display (e.g., @ontologyio/receta)
    required: true

  registry:
    description: Target registry (npm, jsr, or github)
    required: true

  access:
    description: npm access level (public or restricted)
    required: false
    default: 'public'

  auth-token:
    description: Authentication token for the registry
    required: true

runs:
  using: composite
  steps:
    - name: Publish to npm
      if: inputs.registry == 'npm'
      shell: bash
      env:
        NODE_AUTH_TOKEN: ""
      run: |
        npm install -g npm@latest
        printf 'registry=https://registry.npmjs.org/\n' > /tmp/npm-isolated.npmrc
        cd ${{ inputs.package-path }}
        VERSION=$(node -p "require('./package.json').version")
        PACKAGE_NAME=$(node -p "require('./package.json').name")
        if npm view "${PACKAGE_NAME}@${VERSION}" version &>/dev/null 2>&1; then
          echo "⏭️ ${PACKAGE_NAME}@${VERSION} already published, skipping"
        else
          NPM_CONFIG_USERCONFIG=/tmp/npm-isolated.npmrc npm publish --provenance --access ${{ inputs.access }}
        fi

    - name: Publish to JSR
      if: inputs.registry == 'jsr'
      shell: bash
      working-directory: ${{ inputs.package-path }}
      run: npx jsr publish --allow-dirty

    - name: Publish to GitHub Packages
      if: inputs.registry == 'github'
      shell: bash
      working-directory: ${{ inputs.package-path }}
      env:
        NODE_AUTH_TOKEN: ${{ inputs.auth-token }}
      run: |
        VERSION=$(node -p "require('./package.json').version")
        PACKAGE_NAME=$(node -p "require('./package.json').name")
        if npm view "${PACKAGE_NAME}@${VERSION}" version --registry=https://npm.pkg.github.com &>/dev/null 2>&1; then
          echo "⏭️ ${PACKAGE_NAME}@${VERSION} already published to GitHub Packages, skipping"
        else
          npm publish
        fi

    - name: Log success
      shell: bash
      run: echo "✅ Published ${{ inputs.package-name }} to ${{ inputs.registry }}"
